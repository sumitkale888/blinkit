spring.application.name=Ecommerce
spring.config.import=optional:file:./.env[.properties]

server.port=${SERVER_PORT:8089}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.secret=${JWT_SECRET:changeit123456789012345678901234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.issuer=${JWT_ISSUER:EcommerceApp}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

auth.default-admin-full-name=${AUTH_DEFAULT_ADMIN_FULL_NAME:Admin User}
auth.default-admin-email=${AUTH_DEFAULT_ADMIN_EMAIL:admin@example.com}
auth.default-admin-password=${AUTH_DEFAULT_ADMIN_PASSWORD:admin123}
auth.reset-token-expiration-minutes=${AUTH_RESET_TOKEN_EXPIRATION_MINUTES:60}
